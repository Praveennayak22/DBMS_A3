<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Companies and Jobs | Module B</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body data-page="companies-jobs">
  <div class="backdrop"></div>
  <header class="header">
    <div>
      <h1>Companies and Jobs</h1>
      <p>Manage company profiles and job postings from one page.</p>
    </div>
    <div class="session-box">
      <span id="sessionState">Not logged in</span>
      <button id="logoutBtn" class="ghost">Logout</button>
    </div>
  </header>

  <nav class="top-nav">
    <a href="/">Home</a>
    <a href="/ui/portfolio" data-portfolio-access="1">Portfolio</a>
    <a href="/ui/members" data-members-access="1">Members</a>
    <a href="/ui/groups" data-groups-view="1">Groups</a>
    <a href="/ui/companies-jobs" class="active" data-companies-view="1">Companies and Jobs</a>
    <a href="/ui/applications">Applications</a>
    <a href="/ui/audit" data-audit-access="1">Audit Logs</a>
  </nav>

  <main class="page split">
    <section class="card" id="myCompanyCard">
      <h2>My Company</h2>
      <pre id="myCompanyInfo" class="mono">No company linked yet.</pre>
    </section>

    <section class="card" id="companyCrudCard">
      <h2>Companies</h2>
      <div class="row">
        <input id="companyName" placeholder="company name" />
        <input id="companyDomain" placeholder="domain" />
        <button id="createCompanyBtn">Create</button>
      </div>
      <button id="refreshCompaniesBtn" class="ghost">Refresh Companies</button>
      <div id="companiesList" class="list"></div>
    </section>

    <section class="card" id="jobsCrudCard">
      <h2>Jobs</h2>
      <div class="row">
        <input id="jobCompanyId" type="number" placeholder="company id" />
        <input id="jobTitle" placeholder="title" />
        <input id="jobLocation" placeholder="location" />
      </div>
      <div class="row">
        <input id="jobMinCpi" type="number" step="0.1" placeholder="min cpi" />
        <input id="jobDeadline" placeholder="YYYY-MM-DD" />
        <button id="createJobBtn">Create</button>
      </div>
      <button id="refreshJobsBtn" class="ghost">Refresh Jobs</button>
      <div id="jobsList" class="list"></div>
    </section>

    <section class="card" id="adminRecruitersCard">
      <h2>Recruiters</h2>
      <div class="row">
        <input id="recruiterUsername" placeholder="recruiter username" />
        <input id="recruiterEmail" placeholder="recruiter email" />
        <input id="recruiterPassword" placeholder="password" value="recruiter123" />
        <input id="recruiterFullName" placeholder="full name" />
      </div>
      <div class="row">
        <button id="createRecruiterBtn">Create Recruiter</button>
        <input id="deleteRecruiterId" type="number" placeholder="recruiter user id" />
        <button id="deleteRecruiterBtn" class="ghost">Delete Recruiter</button>
        <button id="refreshRecruitersBtn" class="ghost">Refresh Recruiters</button>
      </div>
      <div id="recruitersList" class="list"></div>
    </section>
  </main>

  <script src="/static/common.js?v=20260323"></script>
  <script src="/static/companies_jobs.js?v=20260323"></script>
</body>
</html>
